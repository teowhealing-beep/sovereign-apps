// localStorage wrappers that match window.storage API
async function localGet(key) {
  const val = localStorage.getItem(key);
  if (val === null) throw new Error("not found");
  return { value: val };
}
async function localSet(key, value) {
  localStorage.setItem(key, value);
  return { value };
}

const App = () => {
  const [currentDay, setCurrentDay] = useState(1);
  const [view, setView] = useState("home"); // home, day, journal, progress
  const [completedDays, setCompletedDays] = useState({});
  const [journalEntries, setJournalEntries] = useState({});
  const [journalText, setJournalText] = useState("");
  const [expandedSection, setExpandedSection] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [fadeIn, setFadeIn] = useState(false);

  // Load from storage
  useEffect(() => {
    (async () => {
      try {
        const r1 = await localGet("abundance-completed");
        if (r1) setCompletedDays(JSON.parse(r1.value));
      } catch {}
      try {
        const r2 = await localGet("abundance-journal");
        if (r2) setJournalEntries(JSON.parse(r2.value));
      } catch {}
      try {
        const r3 = await localGet("abundance-currentday");
        if (r3) setCurrentDay(parseInt(r3.value));
      } catch {}
      setLoaded(true);
      setTimeout(() => setFadeIn(true), 50);
    })();
  }, []);

  const saveCompleted = async (data) => {
    setCompletedDays(data);
    try { await localSet("abundance-completed", JSON.stringify(data)); } catch {}
  };

  const saveJournal = async (data) => {
    setJournalEntries(data);
    try { await localSet("abundance-journal", JSON.stringify(data)); } catch {}
  };

  const saveCurrentDay = async (d) => {
    setCurrentDay(d);
    try { await localSet("abundance-currentday", String(d)); } catch {}
  };

  const toggleComplete = (day) => {
    const next = { ...completedDays, [day]: !completedDays[day] };
    saveCompleted(next);
  };

  const completedCount = Object.values(completedDays).filter(Boolean).length;
  const progressPct = Math.round((completedCount / 21) * 100);

  const dayData = DAYS.find(d => d.day === currentDay);

    { key: "morning", icon: "☀️", label: "Morning Practice", content: dayData.morningPractice },
